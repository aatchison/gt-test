name: DevPod CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  DEVPOD_WORKSPACE: ci-test-${{ github.run_id }}
  DEVPOD_PROVIDER: docker

jobs:
  setup:
    name: Setup DevPod
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.workspace.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Add Docker provider
        run: devpod provider add docker || true

      - name: Create DevPod workspace
        id: workspace
        run: |
          devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} .
          echo "name=${{ env.DEVPOD_WORKSPACE }}" >> $GITHUB_OUTPUT

      - name: Wait for workspace to be ready
        run: sleep 30

      - name: Run setup
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make setup"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Resume workspace
        run: devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} . || true

      - name: Run lint
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make lint"

      - name: Cleanup workspace
        if: always()
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true

  test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Resume workspace
        run: devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} . || true

      - name: Push database schema
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make db-push"

      - name: Run tests
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make test"

      - name: Cleanup workspace
        if: always()
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Resume workspace
        run: devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} . || true

      - name: Push database schema
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make db-push"

      - name: Run E2E tests
        env:
          CI: true
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make test-e2e"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Cleanup workspace
        if: always()
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Resume workspace
        run: devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} . || true

      - name: Run typecheck
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make typecheck"

      - name: Cleanup workspace
        if: always()
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install DevPod CLI
        run: |
          curl -Ls https://download.devpod.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Force execution from the path where it was installed for the current shell
          echo "export PATH=\$PATH:\$HOME/.local/bin" >> $GITHUB_ENV

      - name: Resume workspace
        run: devpod up --provider ${{ env.DEVPOD_PROVIDER }} --ide none --id ${{ env.DEVPOD_WORKSPACE }} . || true

      - name: Run build
        run: |
          devpod ssh ${{ env.DEVPOD_WORKSPACE }} --command "cd /workspaces/${{ env.DEVPOD_WORKSPACE }} && make build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            out/
          retention-days: 1

      - name: Cleanup workspace
        if: always()
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete workspace
        run: devpod delete ${{ env.DEVPOD_WORKSPACE }} --force || true
