name: kind Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Allow pushing the built devcontainer image to GHCR for caching
permissions:
  contents: read
  packages: write

env:
  DEVCONTAINER_IMAGE: ghcr.io/${{ github.repository }}/devcontainer

jobs:
  kind-test:
    name: kind Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Runs everything inside the devcontainer which already has:
      #   docker-in-docker, kind, kubectl, helm (from devcontainer features)
      - uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.DEVCONTAINER_IMAGE }}
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: filter
          refFilterForPush: refs/heads/main
          runCmd: make ci-kind
          env: |
            CI=true
