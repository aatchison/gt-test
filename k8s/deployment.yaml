apiVersion: apps/v1
kind: Deployment
metadata:
  name: gttest-app
  namespace: gttest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gttest-app
  template:
    metadata:
      labels:
        app: gttest-app
    spec:
      containers:
        - name: app
          image: gttest-app:local
          imagePullPolicy: Never   # use the locally-loaded image
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: /data/app.db
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gttest-app-auth
                  key: AUTH_SECRET
            - name: NEXTAUTH_URL
              value: "http://localhost:30000"
            - name: NODE_ENV
              value: production
            - name: AUTH_TRUST_HOST
              value: "1"
          volumeMounts:
            - name: db-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: db-data
          emptyDir: {}
